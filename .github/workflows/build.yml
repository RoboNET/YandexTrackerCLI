name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for MinVer

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore YandexTrackerCLI.slnx

      - name: Build (Release)
        run: dotnet build YandexTrackerCLI.slnx --configuration Release --no-restore

      - name: Test (Core)
        run: dotnet test --project tests/YandexTrackerCLI.Core.Tests/YandexTrackerCLI.Core.Tests.csproj --configuration Release --no-build

      - name: Test (CLI)
        run: dotnet test --project tests/YandexTrackerCLI.Tests/YandexTrackerCLI.Tests.csproj --configuration Release --no-build

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,     rid: linux-x64,   archive: tar.gz }
          - { os: ubuntu-24.04-arm,  rid: linux-arm64, archive: tar.gz }
          - { os: macos-latest,      rid: osx-arm64,   archive: tar.gz }
          - { os: windows-latest,    rid: win-x64,     archive: zip    }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish (NativeAOT)
        run: dotnet publish src/YandexTrackerCLI/YandexTrackerCLI.csproj -c Release -r ${{ matrix.rid }} --self-contained -o publish/${{ matrix.rid }}

      - name: Read version
        id: version
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            VERSION=$(./publish/${{ matrix.rid }}/yt.exe --version)
          else
            VERSION=$(./publish/${{ matrix.rid }}/yt --version)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          tar -czf "../../yt-${{ matrix.rid }}.tar.gz" yt
          cd ../..
          ls -la yt-${{ matrix.rid }}.tar.gz

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "publish/${{ matrix.rid }}/yt.exe" -DestinationPath "yt-${{ matrix.rid }}.zip"
          Get-Item yt-${{ matrix.rid }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-${{ matrix.rid }}
          path: yt-${{ matrix.rid }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          ls -la
          sha256sum yt-*.tar.gz yt-*.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/yt-*.tar.gz
            artifacts/yt-*.zip
            artifacts/SHA256SUMS
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
